name: Deploy to Firebase Hosting on PR
on:
  pull_request:
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build

      - name: Deploy Preview to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AREARNZONE }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npm install -g firebase-tools
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Deploying preview using Service Account..."
            echo "$FIREBASE_SERVICE_ACCOUNT" > service-account.json
            export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
            firebase hosting:channel:deploy pr-${{ github.event.pull_request.number }} --project arearnzone --non-interactive
          elif [ -n "$FIREBASE_TOKEN" ]; then
            echo "Deploying preview using Firebase Token..."
            firebase hosting:channel:deploy pr-${{ github.event.pull_request.number }} --project arearnzone --token "$FIREBASE_TOKEN" --non-interactive
          else
            echo "Error: Neither FIREBASE_SERVICE_ACCOUNT_AREARNZONE nor FIREBASE_TOKEN is set."
            exit 1
          fi
