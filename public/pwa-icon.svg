<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Dark Emerald Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#098852" />
      <stop offset="50%" stop-color="#056a3e" />
      <stop offset="100%" stop-color="#03482a" />
    </linearGradient>

    <!-- Vibrant Metallic Gold Gradient for Coin Borders and Text -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffea79" />
      <stop offset="35%" stop-color="#facc15" />
      <stop offset="70%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#a16207" />
    </linearGradient>

    <!-- Soft Drop Shadow for Coins and Badges -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35" />
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#098852" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Solid Background Fill for Maskable Icons Safe Area (100% Canvas Coverage) -->
  <rect width="512" height="512" fill="#03482a" />

  <!-- Main Dark Emerald Squircle Icon Box (Centered within 80% Safe Zone) -->
  <rect x="40" y="40" width="432" height="432" rx="104" fill="url(#bgGrad)" stroke="#10b981" stroke-width="3" filter="url(#glow)" />

  <!-- Coin 1 (Top Left Golden Coin) -->
  <g filter="url(#shadow)">
    <!-- Outer Gold Rim -->
    <circle cx="215" cy="205" r="92" fill="#056a3e" stroke="url(#goldGrad)" stroke-width="18" />
    <!-- Inner Gold Accent Line -->
    <circle cx="215" cy="205" r="74" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6" />
    <!-- Gold Number 1 inside Coin 1 -->
    <text x="215" y="235" text-anchor="middle" fill="url(#goldGrad)" font-size="90" font-weight="900" font-family="'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif">1</text>
  </g>

  <!-- Coin 2 (Bottom Right Overlapping Golden Coin) -->
  <g filter="url(#shadow)">
    <!-- Outer Gold Rim -->
    <circle cx="295" cy="285" r="92" fill="#056a3e" stroke="url(#goldGrad)" stroke-width="18" />
    <!-- Inner Gold Accent Line -->
    <circle cx="295" cy="285" r="74" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6" />
    <!-- Gold Number 1 inside Coin 2 -->
    <text x="295" y="315" text-anchor="middle" fill="url(#goldGrad)" font-size="90" font-weight="900" font-family="'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif">1</text>
  </g>

  <!-- Upward Trend Circular Badge (Bottom Right overlapping Squircle edge) -->
  <g filter="url(#shadow)">
    <!-- White Circle Base -->
    <circle cx="390" cy="390" r="58" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
    
    <!-- Upward Emerald Green Profit Arrow -->
    <path d="M358 412 L380 390 L392 402 L420 372" stroke="#056a3e" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M400 372 H420 V392" stroke="#056a3e" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
</svg>
