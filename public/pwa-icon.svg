<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a9b5e" />
      <stop offset="50%" stop-color="#067647" />
      <stop offset="100%" stop-color="#023a20" />
    </linearGradient>

    <!-- Metallic Gold Gradient for Coin & Accents -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb" />
      <stop offset="25%" stop-color="#fde047" />
      <stop offset="65%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#a16207" />
    </linearGradient>

    <!-- Dark Gold Inner Shadow -->
    <linearGradient id="innerGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ca8a04" />
      <stop offset="100%" stop-color="#854d0e" />
    </linearGradient>

    <!-- White Badge Shadow -->
    <filter id="badgeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.4" />
    </filter>

    <!-- Coin Glow -->
    <filter id="coinGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#10b981" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Full Background (Mandatory for Maskable Icons) -->
  <rect width="512" height="512" fill="url(#bgGrad)" />

  <!-- Rounded Inner Shield / Squircle for Premium App Icon Look -->
  <rect x="36" y="36" width="440" height="440" rx="110" fill="url(#bgGrad)" stroke="#10b981" stroke-width="4" filter="url(#coinGlow)" />

  <!-- Background Decorative Subtle Ring -->
  <circle cx="256" cy="220" r="150" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="8 8" opacity="0.4" />

  <!-- Main Golden Coin Emblem -->
  <circle cx="256" cy="215" r="120" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="18" filter="url(#badgeShadow)" />
  <circle cx="256" cy="215" r="98" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.8" />

  <!-- Bold AR Monogram Inside Golden Coin -->
  <text x="256" y="248" text-anchor="middle" fill="url(#goldGrad)" font-size="96" font-weight="900" font-family="'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif" letter-spacing="-3">AR</text>

  <!-- EARN ZONE Curved/Horizontal Banner -->
  <g filter="url(#badgeShadow)">
    <rect x="86" y="340" width="340" height="64" rx="32" fill="#ffffff" stroke="url(#goldGrad)" stroke-width="4" />
    <text x="256" y="383" text-anchor="middle" fill="#067647" font-size="30" font-weight="900" font-family="'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif" letter-spacing="3">EARN ZONE</text>
  </g>

  <!-- Upward Profit Arrow Badge (Top Right) -->
  <g filter="url(#badgeShadow)">
    <circle cx="370" cy="130" r="44" fill="#ffffff" />
    <circle cx="370" cy="130" r="40" fill="#10b981" />
    <!-- Upward Trend Line & Arrow -->
    <path d="M346 146 L364 128 L374 138 L394 114" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M378 114 H394 V130" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>

  <!-- Sparkle Star (Top Left) -->
  <path d="M 130 110 Q 130 130 110 130 Q 130 130 130 150 Q 130 130 150 130 Q 130 130 130 110 Z" fill="url(#goldGrad)" />
</svg>
